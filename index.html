<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporäre Strassensperrungen – Karte</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
  #map { height: 100%; width: 100%; }

  .popup-flex { display: flex; gap: 10px; align-items: flex-start; }
  .popup-info { flex: 1; min-width: 160px; }
  .popup-minimap {
    width: 220px;
    height: 220px;
    flex-shrink: 0;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #ccc;
    background: #eee;
  }

  /* Popup nie breiter als der Bildschirm, Inhalt scrollt statt den Screen zu sprengen.
     dvh statt vh, weil mobile Browser-Adressleisten vh sonst falsch berechnen. */
  .maplibregl-popup-content {
    max-height: 70vh;
    max-height: 70dvh;
    overflow-y: auto;
  }
  /* Groesserer Schliessen-Button als Touch-Target */
  .maplibregl-popup-close-button {
    font-size: 20px;
    padding: 6px 10px;
    line-height: 1;
  }

  /* Auf schmalen Bildschirmen (Handy): Info und Mini-Karte untereinander statt
     nebeneinander, damit nichts gequetscht wird oder abgeschnitten ist. */
  @media (max-width: 480px) {
    .popup-flex { flex-direction: column; }
    .popup-info { min-width: 0; }
    .popup-minimap { width: 100%; height: 220px; }
    .maplibregl-popup-content {
      max-height: 62vh;
      max-height: 62dvh;
    }
  }
  .popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .popup-row { font-size: 13px; margin: 2px 0; }
  .popup-row b { color: #333; }
  .popup-pdf-link {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 10px;
    background: #d52b1e;
    color: #fff;
    text-decoration: none;
    border-radius: 4px;
    font-size: 13px;
  }
  .popup-pdf-link:hover { background: #b3241a; }
  .popup-disclaimer {
    margin-top: 8px;
    padding: 6px 8px;
    background: #f3eefc;
    border-left: 3px solid #7b3fe4;
    font-size: 11.5px;
    color: #4a2f80;
    line-height: 1.4;
  }

  /* Markante Pin-Marker */
  .site-marker {
    width: 34px;
    height: 34px;
    cursor: pointer;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.45));
    transition: transform 0.15s ease;
  }
  .site-marker:hover { transform: scale(1.15); }

  /* Kleinerer Pin in der Mini-Karte, damit Strassen und Strassennamen sichtbar bleiben */
  .site-marker.site-marker-mini {
    width: 16px;
    height: 16px;
  }
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
  // Zielausschnitt: Uri (inkl. Furkapass) bis Schwyz, über Nidwalden, Obwalden und Luzern.
  // Wird per fitBounds() nach dem Laden gesetzt (nicht im Konstruktor kombiniert mit
  // maxBounds), damit unabhängig vom Seitenverhältnis der Einbettung IMMER die
  // komplette Zielfläche sichtbar ist, statt je nach Format abgeschnitten zu werden.
  const VISIBLE_BOUNDS = [
    [7.85, 46.52], // Südwest (Furkapass-Region mit Marge)
    [9.00, 47.25]  // Nordost (Kanton Schwyz)
  ];

  // Grosszügige Panning-Grenze (verhindert nur das Wegwandern nach Zürich/Basel/Tessin
  // etc.), bewusst deutlich weiter als VISIBLE_BOUNDS, damit sie die fitBounds-Zoomwahl
  // bei extremen Seitenverhältnissen (sehr breit oder sehr hoch) nicht verfälscht.
  const MAX_BOUNDS = [
    [7.0, 45.9],  // Südwest
    [9.9, 47.9]   // Nordost
  ];

  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://vectortiles.geo.admin.ch/styles/ch.swisstopo.basemap.vt/style.json', // offizielle swisstopo Basemap
    center: [8.425, 46.885],
    zoom: 9,
    minZoom: 8,
    maxZoom: 18,
    maxBounds: MAX_BOUNDS,
    dragRotate: false,       // kein versehentliches Drehen per Rechtsklick-Drag
    pitchWithRotate: false,
    touchPitch: false        // verhindert Kippen bei ungenauer Zwei-Finger-Geste am Handy
  });

  // Auf dem Handy fuehrt eine Zwei-Finger-Geste bei maplibre-gl standardmaessig auch
  // zu Rotation, was beim Pinch-Zoom schnell zu einer ungewollt schiefen Karte fuehrt.
  // Fuer diese einfache Uebersichtskarte wird Rotation komplett deaktiviert.
  map.touchZoomRotate.disableRotation();

  // fitBounds() wirkt sofort auf die Transform, unabhängig davon ob alle Kacheln
  // schon geladen sind - kein Warten auf ein load-Event nötig.
  map.fitBounds(VISIBLE_BOUNDS, { padding: 20, animate: false });

  map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-left');

  // maplibre-gl zentriert Popups beim Oeffnen nicht automatisch in den sichtbaren
  // Bereich (anders als z.B. Leaflet). Gerade am Handy, wo das Popup einen grossen
  // Teil des Bildschirms einnimmt, war das Ergebnis: Teile ragen ueber den Rand
  // hinaus und man muss muehsam selbst per Hand nachschieben. Stattdessen wird die
  // Karte hier nach dem Oeffnen automatisch so verschoben, dass das komplette
  // Popup sichtbar ist.
  function panPopupIntoView(popup) {
    requestAnimationFrame(() => {
      const popupEl = popup.getElement();
      if (!popupEl) return;
      const margin = 12;
      const mapRect = map.getContainer().getBoundingClientRect();
      const popupRect = popupEl.getBoundingClientRect();
      let dx = 0;
      let dy = 0;
      if (popupRect.left < mapRect.left + margin) {
        dx = popupRect.left - (mapRect.left + margin);
      } else if (popupRect.right > mapRect.right - margin) {
        dx = popupRect.right - (mapRect.right - margin);
      }
      if (popupRect.top < mapRect.top + margin) {
        dy = popupRect.top - (mapRect.top + margin);
      } else if (popupRect.bottom > mapRect.bottom - margin) {
        dy = popupRect.bottom - (mapRect.bottom - margin);
      }
      if (dx === 0 && dy === 0) return;
      const centerPx = map.project(map.getCenter());
      const newCenter = map.unproject([centerPx.x + dx, centerPx.y + dy]);
      map.easeTo({ center: newCenter, duration: 300 });
    });
  }

  // Pin-Farbe nach Typ:
  // Totalsperrung = rot, andere Konzepte (z.B. Interventionskonzept) = orange,
  // Pass-Sperrung = blau, Alertswiss-Gefahrengebiet = violett
  const MARKER_COLORS = {
    totalsperrung: '#d52b1e',
    konzept: '#f2811d',
    passsperrung: '#1c6fd6',
    gefahrengebiet: '#7b3fe4'
  };

  // Icon-Glyphen (werden in der jeweiligen Pin-Farbe auf den weissen Kreis gezeichnet)
  const ICONS = {
    // Sperrung/Barriere: fuer totalsperrung, konzept, passsperrung
    barrier: (c) => `
      <rect x="9.5" y="15.3" width="15" height="3.4" rx="1.2" fill="${c}" transform="rotate(-18 17 17)"/>
      <circle cx="10.3" cy="14.2" r="1.4" fill="${c}"/>
      <circle cx="23.7" cy="19.8" r="1.4" fill="${c}"/>
    `,
    // Feuer/Feuerverbot/Waldbrand
    flame: (c) => `
      <path fill="${c}" d="M19 8.5c-3.5 2.5-7 6-7 9.8a5 5 0 1010 0c0-2.2-1-3.8-2.2-5.2.4 1.9-.6 3.2-2 3.2-1.4 0-2.3-1.2-1.9-2.6.4-1.4 1.6-2.2 3.1-5.2z"/>
      <path fill="#ffffff" d="M18.5 15c-1.3 1.6-2.5 2.9-2.5 4.4a2.2 2.2 0 004.4 0c0-1.5-1-2.7-1.9-4.4z"/>
    `,
    // Fels-/Bergsturz, Erdrutsch, Murgang
    mountain: (c) => `
      <path fill="${c}" d="M8.5 23.5L14 13.5l3.5 5 2.7-3.3 5.8 8.3z"/>
    `,
    // Lawine / Schnee
    snowflake: (c) => `
      <g stroke="${c}" stroke-width="1.6" stroke-linecap="round">
        <line x1="17" y1="10" x2="17" y2="24"/>
        <line x1="10.9" y1="13.5" x2="23.1" y2="20.5"/>
        <line x1="10.9" y1="20.5" x2="23.1" y2="13.5"/>
      </g>
    `,
    // Hitzewelle / Trockenheit
    sun: (c) => `
      <circle cx="17" cy="17" r="3.2" fill="${c}"/>
      <g stroke="${c}" stroke-width="1.6" stroke-linecap="round">
        <line x1="17" y1="9.5" x2="17" y2="11.8"/>
        <line x1="17" y1="22.2" x2="17" y2="24.5"/>
        <line x1="9.5" y1="17" x2="11.8" y2="17"/>
        <line x1="22.2" y1="17" x2="24.5" y2="17"/>
        <line x1="12.2" y1="12.2" x2="13.7" y2="13.7"/>
        <line x1="20.3" y1="20.3" x2="21.8" y2="21.8"/>
        <line x1="12.2" y1="21.8" x2="13.7" y2="20.3"/>
        <line x1="20.3" y1="13.7" x2="21.8" y2="12.2"/>
      </g>
    `,
    // Hochwasser
    wave: (c) => `
      <path fill="none" stroke="${c}" stroke-width="1.6" stroke-linecap="round" d="M10.5 15c1.5-1.8 3-1.8 4.5 0s3 1.8 4.5 0 3-1.8 4.5 0"/>
      <path fill="none" stroke="${c}" stroke-width="1.6" stroke-linecap="round" d="M10.5 20c1.5-1.8 3-1.8 4.5 0s3 1.8 4.5 0 3-1.8 4.5 0"/>
    `,
    // Fallback fuer unbekannte/sonstige Ereignisse
    warning: (c) => `
      <text x="17" y="21.5" text-anchor="middle" font-size="12" font-weight="700" fill="${c}">!</text>
    `
  };

  // Ordnet den Alertswiss-"Ereignis"-Text einem Icon zu
  const EVENT_ICON_MAP = {
    'feuerverbot': 'flame',
    'waldbrand': 'flame',
    'divieto di accendere fuochi': 'flame',
    'trockenheit': 'sun',
    'hitzewelle': 'sun',
    'fels- und bergsturz, erdrutsch': 'mountain',
    'murgang': 'mountain',
    'lawine': 'snowflake',
    'schnee': 'snowflake',
    'hochwasser': 'wave'
  };

  // Sperrungs-Typen bekommen immer das Barriere-Icon; bei Alertswiss-Gefahrengebieten
  // richtet sich das Icon nach dem gemeldeten Ereignistyp
  function getIconKey(site) {
    if (site.typ !== 'gefahrengebiet') return 'barrier';
    const ereignis = (site.details || []).find(d => d.label === 'Ereignis');
    const key = ereignis ? ereignis.value.trim().toLowerCase() : '';
    return EVENT_ICON_MAP[key] || 'warning';
  }

  // Markanter Pin als SVG (Warnfarbe, weisser Rand, typspezifisches Icon)
  // mini=true liefert eine verkleinerte Variante fuer die Popup-Mini-Karte
  function createMarkerElement(typ, iconKey, mini) {
    const color = MARKER_COLORS[typ] || MARKER_COLORS.konzept;
    const glyph = (ICONS[iconKey] || ICONS.warning)(color);
    const el = document.createElement('div');
    el.className = mini ? 'site-marker site-marker-mini' : 'site-marker';
    el.innerHTML = `
      <svg viewBox="0 0 34 44" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 0C7.6 0 0 7.6 0 17c0 12 17 27 17 27s17-15 17-27C34 7.6 26.4 0 17 0z"
              fill="${color}" stroke="#ffffff" stroke-width="2.5"/>
        <circle cx="17" cy="17" r="7" fill="#ffffff"/>
        ${glyph}
      </svg>
    `;
    return el;
  }

  // manual-sites.json: von Hand gepflegte Standorte (aus PDFs etc.)
  // auto-sites.json: taeglich per GitHub Action aus TCS/Alertswiss generiert
  Promise.all([
    fetch('data/manual-sites.json').then(res => res.json()),
    fetch('data/auto-sites.json').then(res => res.json()).catch(() => [])
  ])
    .then(([manualSites, autoSites]) => {
      [...manualSites, ...autoSites].forEach((site, idx) => {
        const detailRows = (site.details || [])
          .map(d => `<div class="popup-row"><b>${d.label}:</b> ${d.value}</div>`)
          .join('');
        const pdfLink = site.pdf
          ? `<a class="popup-pdf-link" href="${site.pdf}" target="_blank" rel="noopener">PDF öffnen</a>`
          : (site.link ? `<a class="popup-pdf-link" href="${site.link}" target="_blank" rel="noopener">Quelle öffnen</a>` : '');
        const disclaimer = site.typ === 'gefahrengebiet'
          ? `<div class="popup-disclaimer">⚠ Automatisch aus einem inoffiziellen Alertswiss-Feed übernommen. Keine offizielle Quelle, kann fehlerhaft sein oder ausfallen.</div>`
          : '';
        const minimapId = `popup-minimap-${idx}`;
        const popupHtml = `
          <div class="popup-flex">
            <div class="popup-info">
              <div class="popup-title">${site.name}</div>
              ${detailRows}
              ${pdfLink}
              ${disclaimer}
            </div>
            <div class="popup-minimap" id="${minimapId}"></div>
          </div>
        `;
        const popup = new maplibregl.Popup({ offset: 30, maxWidth: 'min(500px, 94vw)' }).setHTML(popupHtml);

        // Mini-Karte: wird erst beim Oeffnen des Popups erzeugt und beim Schliessen
        // wieder entfernt (begrenzte Anzahl gleichzeitiger WebGL-Kontexte im Browser).
        let miniMap = null;
        popup.on('open', () => {
          panPopupIntoView(popup);
          const container = document.getElementById(minimapId);
          if (!container) return;
          miniMap = new maplibregl.Map({
            container,
            style: 'https://vectortiles.geo.admin.ch/styles/ch.swisstopo.basemap.vt/style.json',
            center: [site.lon, site.lat],
            zoom: 16,
            interactive: false,
            attributionControl: { compact: true }
          });
          miniMap.on('load', () => {
            miniMap.resize();
            // Strassennamen werden vom Basemap-Style standardmaessig nur gezeigt, wenn
            // genug Platz neben Kachel-/Kartenraendern ist - in der kleinen Mini-Karte
            // unterdrueckt das sonst gerade die Namen der Strassen, um die es hier geht.
            // Ausserdem etwas groesser/deutlicher darstellen als im Original-Style.
            try {
              miniMap.setLayoutProperty('transportation_label', 'symbol-avoid-edges', false);
              miniMap.setLayoutProperty('transportation_label', 'text-size', 15);
            } catch (e) { /* Layer-Name koennte sich mit kuenftigen Style-Versionen aendern */ }
            new maplibregl.Marker({ element: createMarkerElement(site.typ, getIconKey(site), true), anchor: 'bottom' })
              .setLngLat([site.lon, site.lat])
              .addTo(miniMap);
          });
        });
        popup.on('close', () => {
          if (miniMap) {
            miniMap.remove();
            miniMap = null;
          }
        });

        new maplibregl.Marker({ element: createMarkerElement(site.typ, getIconKey(site)), anchor: 'bottom' })
          .setLngLat([site.lon, site.lat])
          .setPopup(popup)
          .addTo(map);
      });
    })
    .catch(err => console.error('Fehler beim Laden der Standorte:', err));
</script>
</body>
</html>
