<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporäre Strassensperrungen – Karte</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
  #map { height: 100%; width: 100%; }

  .popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .popup-row { font-size: 13px; margin: 2px 0; }
  .popup-row b { color: #333; }
  .popup-pdf-link {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 10px;
    background: #d52b1e;
    color: #fff;
    text-decoration: none;
    border-radius: 4px;
    font-size: 13px;
  }
  .popup-pdf-link:hover { background: #b3241a; }

  /* Markante Pin-Marker */
  .site-marker {
    width: 34px;
    height: 34px;
    cursor: pointer;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.45));
    transition: transform 0.15s ease;
  }
  .site-marker:hover { transform: scale(1.15); }
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
  // Kartenausschnitt auf die Zentralschweiz begrenzt (Vierwaldstättersee-Region)
  const ZENTRALSCHWEIZ_BOUNDS = [
    [7.95, 46.65], // Südwest
    [8.95, 47.20]  // Nordost
  ];

  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://vectortiles.geo.admin.ch/styles/ch.swisstopo.basemap.vt/style.json', // offizielle swisstopo Basemap
    center: [8.35, 46.97],
    zoom: 9.5,
    minZoom: 8,
    maxZoom: 18,
    maxBounds: ZENTRALSCHWEIZ_BOUNDS
  });

  map.addControl(new maplibregl.NavigationControl(), 'top-left');

  // Markanter Pin als SVG (Warnfarbe, weisser Rand, Ausrufezeichen)
  function createMarkerElement() {
    const el = document.createElement('div');
    el.className = 'site-marker';
    el.innerHTML = `
      <svg viewBox="0 0 34 44" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 0C7.6 0 0 7.6 0 17c0 12 17 27 17 27s17-15 17-27C34 7.6 26.4 0 17 0z"
              fill="#d52b1e" stroke="#ffffff" stroke-width="2.5"/>
        <circle cx="17" cy="17" r="7" fill="#ffffff"/>
        <text x="17" y="21.5" text-anchor="middle" font-size="12" font-weight="700" fill="#d52b1e">!</text>
      </svg>
    `;
    return el;
  }

  fetch('data/sites.json')
    .then(res => res.json())
    .then(sites => {
      sites.forEach(site => {
        const detailRows = (site.details || [])
          .map(d => `<div class="popup-row"><b>${d.label}:</b> ${d.value}</div>`)
          .join('');
        const popupHtml = `
          <div class="popup-title">${site.name}</div>
          ${detailRows}
          <a class="popup-pdf-link" href="${site.pdf}" target="_blank" rel="noopener">PDF öffnen</a>
        `;
        const popup = new maplibregl.Popup({ offset: 30, maxWidth: '320px' }).setHTML(popupHtml);
        new maplibregl.Marker({ element: createMarkerElement(), anchor: 'bottom' })
          .setLngLat([site.lon, site.lat])
          .setPopup(popup)
          .addTo(map);
      });
    })
    .catch(err => console.error('Fehler beim Laden der Standorte:', err));
</script>
</body>
</html>
