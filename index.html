<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporäre Strassensperrungen – Karte</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
  #map { height: 100%; width: 100%; }
  .popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .popup-row { font-size: 13px; margin: 2px 0; }
  .popup-row b { color: #333; }
  .popup-pdf-link {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 10px;
    background: #d52b1e;
    color: #fff;
    text-decoration: none;
    border-radius: 4px;
    font-size: 13px;
  }
  .popup-pdf-link:hover { background: #b3241a; }
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Karte zentriert auf die Schweiz
  const map = L.map('map').setView([46.8, 8.3], 8);

  // swisstopo Kartenlayer (Pixelkarte farbig, EPSG:3857 / Web Mercator)
  L.tileLayer('https://wmts.geo.admin.ch/1.0.0/ch.swisstopo.pixelkarte-farbe/default/current/3857/{z}/{x}/{y}.jpeg', {
    attribution: '© <a href="https://www.swisstopo.admin.ch">swisstopo</a>',
    maxZoom: 18,
    minZoom: 6
  }).addTo(map);

  fetch('data/sites.json')
    .then(res => res.json())
    .then(sites => {
      sites.forEach(site => {
        const marker = L.marker([site.lat, site.lon]).addTo(map);
        const detailRows = (site.details || [])
          .map(d => `<div class="popup-row"><b>${d.label}:</b> ${d.value}</div>`)
          .join('');
        const popupHtml = `
          <div class="popup-title">${site.name}</div>
          ${detailRows}
          <a class="popup-pdf-link" href="${site.pdf}" target="_blank" rel="noopener">PDF öffnen</a>
        `;
        marker.bindPopup(popupHtml);
      });
    })
    .catch(err => console.error('Fehler beim Laden der Standorte:', err));
</script>
</body>
</html>
